name: Verify Site Snapshot

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify-snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate snapshot artifacts and consistency
        run: python3 scripts/verify_site_snapshot.py
