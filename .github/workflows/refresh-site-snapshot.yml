name: Refresh Site Snapshot

on:
  schedule:
    - cron: "20 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Rebuild snapshot artifacts
        run: python3 scripts/build_site_snapshot.py

      - name: Verify generated artifacts
        run: python3 scripts/verify_site_snapshot.py

      - name: Create or update refresh PR
        id: create_refresh_pr
        continue-on-error: true
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: refresh movie scene snapshot data"
          branch: "ci/refresh-site-snapshot"
          delete-branch: true
          title: "chore: refresh movie scene snapshot data"
          body: |
            ## Automated snapshot refresh
            - rebuilds `data/moviescenebattles_dataset.json`
            - rebuilds `data/site_stats.json`
            - generated by `.github/workflows/refresh-site-snapshot.yml`

      - name: Note when PR creation is blocked by repository policy
        if: steps.create_refresh_pr.outcome == 'failure'
        run: |
          echo "Snapshot data was refreshed, but automatic PR creation is blocked by repository policy." >> "$GITHUB_STEP_SUMMARY"
          echo "See repository Actions permissions for pull request creation settings." >> "$GITHUB_STEP_SUMMARY"
